<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMA Dropzone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* UFC Style Colors */
        :root {
            --ufc-black: #19191E;
            --ufc-red: #D20A0A;
            --ufc-white: #FAFBFD;
            --ufc-gray: #222228;
            --ufc-light-gray: #3A3A42;
        }

        /* Base */
        body {
            background-color: var(--ufc-black);
            color: var(--ufc-white);
            font-family: 'Arial', sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #000000 !important;
            border-bottom: 3px solid var(--ufc-red);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--ufc-white) !important;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-link {
            color: var(--ufc-white) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            padding: 8px 16px !important;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--ufc-red) !important;
        }

        /* Cards */
        .ufc-card {
            background-color: var(--ufc-gray);
            border: 1px solid #404048;
            border-radius: 4px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .ufc-card:hover {
            transform: translateY(-4px);
            border-color: var(--ufc-red);
        }

        /* Section Headers */
        .section-header {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ufc-white);
            border-left: 4px solid var(--ufc-red);
            padding-left: 12px;
        }

        /* Buttons */
        .btn-ufc {
            background-color: var(--ufc-red);
            color: var(--ufc-white) !important;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            padding: 8px 20px;
            transition: background-color 0.2s;
        }

        .btn-ufc:hover {
            background-color: #a00808;
            color: var(--ufc-white) !important;
        }

        .btn-ufc-outline {
            background-color: transparent;
            color: var(--ufc-red) !important;
            border: 2px solid var(--ufc-red);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            padding: 6px 16px;
            transition: all 0.2s;
        }

        .btn-ufc-outline:hover {
            background-color: var(--ufc-red);
            color: var(--ufc-white) !important;
        }

        /* Badge */
        .badge-ufc {
            background-color: var(--ufc-red);
            color: var(--ufc-white) !important;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            border-radius: 2px;
        }

        /* Table */
        .table-ufc {
            color: var(--ufc-white);
        }
        /* Fix table background */
.table {
    background-color: transparent !important;
    color: #FAFBFD !important;
}

.table > :not(caption) > * > * {
    background-color: transparent !important;
    color: #FAFBFD !important;
    border-color: #3A3A42 !important;
}

.table thead {
    background-color: #D20A0A !important;
}

.table thead th {
    color: #FAFBFD !important;
    border: none !important;
}
        .table-ufc thead {
            background-color: var(--ufc-red);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--ufc-white);
        }

        .table-ufc thead th {
            color: var(--ufc-white) !important;
            border: none;
        }

        .table-ufc tbody tr {
            border-bottom: 1px solid var(--ufc-light-gray);
            color: var(--ufc-white);
        }

        .table-ufc tbody tr:hover {
            background-color: var(--ufc-gray);
        }

        .table-ufc tbody td {
            color: var(--ufc-white) !important;
            border-color: var(--ufc-light-gray);
        }

        /* Footer */
        .footer {
            background-color: #000000;
            border-top: 3px solid var(--ufc-red);
            padding: 30px 0;
            margin-top: 60px;
        }

        /* Form controls */
        .form-control {
            background-color: var(--ufc-gray) !important;
            border: 1px solid var(--ufc-light-gray);
            color: var(--ufc-white) !important;
        }

        .form-control:focus {
            background-color: var(--ufc-gray) !important;
            border-color: var(--ufc-red);
            color: var(--ufc-white) !important;
            box-shadow: 0 0 0 0.2rem rgba(210, 10, 10, 0.25);
        }

        select.form-control option {
            background-color: var(--ufc-gray);
            color: var(--ufc-white);
        }

        /* Labels */
        label {
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        /* Alert */
        .alert-success {
            background-color: #0a2a0a;
            border-color: #00aa00;
            color: #00ff00;
        }

        .alert-danger {
            background-color: #2a0000;
            border-color: var(--ufc-red);
            color: #ff6666;
        }

        /* Badge bootstrap override */
        .badge {
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='images/mdz.jpg') }}"
                     alt="MMA Dropzone Logo"
                     height="45"
                     class="me-2">
                MMA Dropzone
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
    <a class="nav-link" href="{{ url_for('fighters') }}">Fighters</a>
    <a class="nav-link" href="{{ url_for('events') }}">Events</a>
    <a class="nav-link" href="{{ url_for('news') }}">News</a>
    {% if current_user.is_authenticated %}
        {% if current_user.is_admin %}
            <a class="nav-link"
               href="{{ url_for('admin') }}"
               style="color: #D20A0A !important;">
                Admin
            </a>
        {% endif %}
        <a class="nav-link" href="{{ url_for('logout') }}">
            Logout
        </a>
    {% else %}
        <a class="nav-link" href="{{ url_for('register') }}">
            Register
        </a>
        <a class="nav-link btn-ufc btn btn-sm ms-2"
           href="{{ url_for('login') }}">
            Login
        </a>
    {% endif %}
</div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p style="color: #666666; font-size: 0.85rem;
                      text-transform: uppercase; letter-spacing: 1px;">
                © 2026 MMA Dropzone — Your #1 Source for UFC & Nepali MMA 🇳🇵
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
